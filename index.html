    <title>Plated</title>
  <script>
    try {
      const s = localStorage.getItem('plated-app-store')
      const dark = s ? JSON.parse(s)?.state?.darkMode : false
      if (dark) document.documentElement.classList.add('dark')
    } catch {}
  </script>
